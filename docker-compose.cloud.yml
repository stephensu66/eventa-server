services:
  app:
    build:
      context: .
    restart: unless-stopped
    environment:
      APP_HOST: ${APP_HOST:-0.0.0.0}
      APP_PORT: ${APP_PORT:-3300}
      APPID: ${APPID}
      APPSECRET: ${APPSECRET}
      JWT_SECRET: ${JWT_SECRET}
      COS_SECRET_ID: ${COS_SECRET_ID}
      COS_SECRET_KEY: ${COS_SECRET_KEY}
      COS_BUCKET: ${COS_BUCKET:-eventa-cos-1368015931}
      COS_REGION: ${COS_REGION:-ap-beijing}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      DB_CONNECT_RETRIES: ${DB_CONNECT_RETRIES:-20}
      DB_CONNECT_DELAY_MS: ${DB_CONNECT_DELAY_MS:-3000}
    ports:
      - "${APP_PORT:-3300}:${APP_PORT:-3300}"
    networks:
      - db_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:$${APP_PORT:-3300}/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  db_net:
    external: true
    name: ${EXTERNAL_DB_NETWORK}
