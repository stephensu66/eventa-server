services:
  mysql:
    build:
      context: .
      dockerfile: Dockerfile.mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change_root_password}
      MYSQL_DATABASE: ${DB_DATABASE:-taro_event}
      MYSQL_USER: ${DB_USER:-taro_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-change_me}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  app:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      APP_HOST: 0.0.0.0
      DB_HOST: mysql
      DB_PORT: 3306
    ports:
      - "${APP_PORT:-3300}:${APP_PORT:-3300}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:$${APP_PORT:-3300}/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  mysql-data:
