name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate source syntax and compose config
        run: npm run ci

      - name: Build app image
        run: docker build -t taro-server-app:test .

      - name: Build local mysql image
        run: docker build -f Dockerfile.mysql -t taro-server-mysql:test .
